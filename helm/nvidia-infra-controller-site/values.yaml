# =============================================================================
# Vault — BMC credential storage for Core tier
# =============================================================================
vault:
  fullnameOverride: vault
  global:
    openshift: true
  server:
    image:
      repository: docker.io/hashicorp/vault
    standalone:
      enabled: true
      config: |
        listener "tcp" {
          address = "[::]:8200"
          tls_disable = true
        }
        storage "file" {
          path = "/vault/data"
        }
        disable_mlock = true
    dataStorage:
      enabled: true
      storageClass: null
      size: 1Gi
    ha:
      enabled: false
  ui:
    enabled: false
  injector:
    enabled: false

# =============================================================================
# Global settings — inherited by all NICo REST sub-charts
# =============================================================================
global:
  image:
    repository: quay.io/fdupont-redhat
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  certificate:
    issuerRef:
      kind: ClusterIssuer
      name: nico-rest-ca-issuer
      group: cert-manager.io
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nico-site

# =============================================================================
# nico-rest-common — shared secrets for site profile
#
# The site-agent gets its Temporal client certificates from the OTP bootstrap
# flow (exchanged with the cloud's site-manager), not from cert-manager.
# =============================================================================
nico-rest-common:
  secrets:
    create: true
    dbCreds:
      username: nico
      password: nico
    keycloakClientSecret:
      value: ""
    temporalEncryptionKey:
      value: "local-dev"
    imagePullSecret:
      dockerconfigjson: "eyJhdXRocyI6e319"

# =============================================================================
# nico-rest-site-agent
#
# Connects to the cloud profile's Temporal via OTP-bootstrapped mTLS certs.
# TEMPORAL_HOST points to the cloud's Temporal frontend service.
# On a single dev cluster, use the cross-namespace service name.
# In production (cross-cluster), use an external DNS/VPN address.
#
# TEMPORAL_SUBSCRIBE_NAMESPACE defaults to CLUSTER_ID (the site UUID assigned
# during registration). Per-site namespaces are created by the REST API.
# =============================================================================
nico-rest-site-agent:
  replicaCount: 1
  certificate:
    enabled: true
    uris:
      - "spiffe://nico.local/nvidia-infra-controller-site/sa/nico-rest-site-agent"
  bootstrap:
    enabled: false
    siteManager:
      address: nico-rest-site-manager.nvidia-infra-controller-cloud
      tlsSecret: site-manager-tls
  envConfig:
    ESA_PORT: "8080"
    METRICS_PORT: "2112"
    DEV_MODE: "false"
    ENABLE_DEBUG: "false"
    ENABLE_TLS: "true"
    NICO_ADDRESS: "nico-api.nvidia-infra-controller-site:1079"
    NICO_SEC_OPT: "0"
    CORE_GRPC_ADDRESS: "nico-api.nvidia-infra-controller-site:1079"
    CORE_GRPC_CA_CERT_PATH: "/etc/nico/ca.crt"
    CORE_GRPC_CLIENT_CERT_PATH: "/etc/nico/tls.crt"
    CORE_GRPC_CLIENT_KEY_PATH: "/etc/nico/tls.key"
    CLUSTER_ID: ""
    TEMPORAL_HOST: "temporal-frontend.nvidia-infra-controller-cloud"
    TEMPORAL_PORT: "7233"
    TEMPORAL_SERVER: "interservice.server.temporal.local"
    TEMPORAL_PUBLISH_NAMESPACE: "site"
    TEMPORAL_PUBLISH_QUEUE: "site"
    TEMPORAL_SUBSCRIBE_NAMESPACE: "site"
    TEMPORAL_SUBSCRIBE_QUEUE: "site"
    TEMPORAL_INVENTORY_SCHEDULE: "@every 3m"
    TEMPORAL_CERT_PATH: "/etc/temporal-certs"
    TEMPORAL_CERT: "temporal-client-site-agent-certs"

# =============================================================================
# nico-core — Core tier (bare metal management)
# =============================================================================
nico-core:
  enabled: true
  global:
    image:
      repository: quay.io/fdupont-redhat/nico-core
      tag: v0.10.3
      pullPolicy: IfNotPresent
    spiffe:
      trustDomain: nico.local
    certificate:
      issuerRef:
        kind: ClusterIssuer
        name: vault-nico-issuer
        group: cert-manager.io

  nico-api:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    hostname: "nico.local"
    siteConfig:
      enabled: true
      nicoApiSiteConfig: |
        [auth.trust]
        spiffe_trust_domain = "nico.local"
        spiffe_service_base_paths = ["/nico-system/sa/", "/default/sa/", "/nvidia-infra-controller-site/sa/", "/elektra-site-agent/sa/"]
        spiffe_machine_base_path = "/nico-system/machine/"
        [pools.lo-ip]
        type = "ipv4"
        ranges = [{ start = "10.100.0.1", end = "10.100.0.254" }]

        [pools.vpc-dpu-lo]
        type = "ipv4"
        ranges = [{ start = "10.101.0.1", end = "10.101.0.254" }]

        [pools.secondary-vtep-ip]
        type = "ipv4"
        ranges = [{ start = "10.102.0.1", end = "10.102.0.254" }]

        [pools.vni]
        type = "integer"
        ranges = [{ start = "100000", end = "199999" }]

        [pools.vpc-vni]
        type = "integer"
        ranges = [{ start = "200000", end = "299999" }]

        [pools.external-vpc-vni]
        type = "integer"
        ranges = [{ start = "300000", end = "399999" }]

        [pools.vlan-id]
        type = "integer"
        ranges = [{ start = "100", end = "4094" }]

        [pools.fnn-asn]
        type = "integer"
        ranges = [{ start = "4200000000", end = "4200000254" }]
    envFrom:
      vaultApproleTokens:
        secretName: nico-vault-approle-tokens
      vaultToken:
        secretName: vault-unseal-secret
      vaultClusterInfo:
        configMapName: vault-cluster-info
      databaseCredentials:
        secretName: nico-site-core-pg-pguser-nico
      databaseConfig:
        configMapName: nico-system-nico-database-config
      nicoWebHostname:
        configMapName: nico-web-api-hostname
    vaultClusterInfo:
      VAULT_SERVICE: "http://vault.nvidia-infra-controller-site:8200"
      NICO_VAULT_MOUNT: "secrets"
      NICO_VAULT_PKI_MOUNT: "nicoca"
    databaseConfig:
      DB_HOST: "nico-site-core-pg-primary"
      DB_PORT: "5432"
      DB_NAME: "nico"

  # Disable services that need real network infrastructure
  nico-bmc-proxy:
    enabled: false
  nico-dhcp:
    enabled: false
  nico-dns:
    enabled: false
  nico-dsx-exchange-consumer:
    enabled: false
  nico-hardware-health:
    enabled: false
  nico-ntp:
    enabled: false
  nico-pxe:
    enabled: false
  nico-ssh-console-rs:
    enabled: false
  unbound:
    enabled: false
  nico-flow:
    enabled: false
