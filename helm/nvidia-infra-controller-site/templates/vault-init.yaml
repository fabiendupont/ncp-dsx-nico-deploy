SPDX-FileCopyrightText: Copyright (c) 2026 Red Hat, Inc. All rights reserved.
SPDX-License-Identifier: Apache-2.0

Initializes, unseals Vault, enables KV v2 secrets engine, and stores
the root token in a Kubernetes Secret for Core API consumption.
Matches the operator's two-container pattern from vault.go.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-site.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-init
subjects:
  - kind: ServiceAccount
    name: vault-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-site.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-init
      initContainers:
        - name: vault-init
          image: docker.io/hashicorp/vault:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              export VAULT_ADDR=http://vault.{{ .Release.Namespace }}.svc:8200
              export VAULT_SKIP_VERIFY=true

              echo "Waiting for Vault to be reachable..."
              until vault status -format=json 2>/dev/null | grep -q '"initialized"'; do
                echo "Still waiting..."
                sleep 5
              done

              if vault status -format=json 2>/dev/null | grep -q '"initialized".*true'; then
                echo "Vault already initialized"
                exit 0
              fi

              echo "Initializing Vault..."
              INIT_OUTPUT=$(vault operator init -key-shares=1 -key-threshold=1 -format=json)

              UNSEAL_KEY=$(echo "$INIT_OUTPUT" | tr -d '\n ' | grep -o '"unseal_keys_b64":\["[^"]*"' | sed 's/.*\["//' | sed 's/".*//')
              ROOT_TOKEN=$(echo "$INIT_OUTPUT" | tr -d '\n ' | grep -o '"root_token":"[^"]*"' | sed 's/.*:"//' | sed 's/".*//')

              echo "Unsealing Vault..."
              vault operator unseal "$UNSEAL_KEY"

              echo "Enabling KV v2 secrets engine..."
              export VAULT_TOKEN="$ROOT_TOKEN"
              vault secrets enable -path=secrets kv-v2 || true

              echo "$UNSEAL_KEY" > /vault-data/unseal-key
              echo "$ROOT_TOKEN" > /vault-data/root-token
              echo "Vault initialized and unsealed successfully"
          volumeMounts:
            - name: vault-data
              mountPath: /vault-data
      containers:
        - name: create-secret
          image: docker.io/bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              if kubectl get secret vault-unseal-secret -n {{ .Release.Namespace }} 2>/dev/null; then
                echo "Secret already exists"
                exit 0
              fi

              if [ ! -f /vault-data/root-token ]; then
                echo "No root-token file — Vault was already initialized"
                exit 0
              fi

              UNSEAL_KEY=$(cat /vault-data/unseal-key)
              ROOT_TOKEN=$(cat /vault-data/root-token)

              kubectl create secret generic vault-unseal-secret -n {{ .Release.Namespace }} \
                --from-literal=unseal-key="$UNSEAL_KEY" \
                --from-literal=root-token="$ROOT_TOKEN" \
                --from-literal=token="$ROOT_TOKEN"

              echo "Secret created successfully"
          volumeMounts:
            - name: vault-data
              mountPath: /vault-data
              readOnly: true
      volumes:
        - name: vault-data
          emptyDir: {}
