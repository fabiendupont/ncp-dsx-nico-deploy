{{- if index .Values "nico-core" "enabled" }}
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: nico-site-core-pg
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-site.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
spec:
  postgresVersion: 16
  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: 5Gi
  users:
    - name: nico
      databases:
        - nico
      options: "SUPERUSER"
      password:
        type: AlphaNumeric
  databaseInitSQL:
    key: init.sql
    name: nico-core-db-init
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nico-core-db-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-site.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
{{- end }}
