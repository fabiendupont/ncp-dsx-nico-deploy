SPDX-FileCopyrightText: Copyright (c) 2026 Red Hat, Inc. All rights reserved.
SPDX-License-Identifier: Apache-2.0

Copies the root CA secret from cert-manager namespace into the cloud
namespace as ca-signing-secret. Credsmgr uses this to sign site-agent
client certs. Using the root CA (not an intermediate) ensures site-agents
can verify Temporal's server cert with the returned CA certificate.
*/}}
{{- if index .Values "nico-rest-cert-manager" "enabled" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: copy-ca-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-8"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-copy-ca-secret
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-8"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: copy-ca-secret
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: copy-ca-signing-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-infra-controller-cloud.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-7"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: copy-ca-secret
      containers:
        - name: copy
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for root CA secret..."
              until oc get secret nico-root-ca-secret -n cert-manager > /dev/null 2>&1; do
                sleep 5
              done
              echo "Copying root CA to ca-signing-secret..."
              TLS_CRT=$(oc get secret nico-root-ca-secret -n cert-manager -o jsonpath='{.data.tls\.crt}')
              TLS_KEY=$(oc get secret nico-root-ca-secret -n cert-manager -o jsonpath='{.data.tls\.key}')
              CA_CRT=$(oc get secret nico-root-ca-secret -n cert-manager -o jsonpath='{.data.ca\.crt}')
              cat <<EOSECRET | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: ca-signing-secret
                namespace: {{ .Release.Namespace }}
              type: Opaque
              data:
                tls.crt: ${TLS_CRT}
                tls.key: ${TLS_KEY}
                ca.crt: ${CA_CRT}
              EOSECRET
              echo "Done"
{{- end }}
