{{- if .Values.crunchyPostgres.enabled }}
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: crunchy-postgres-operator
  namespace: {{ .Values.crunchyPostgres.namespace }}
  labels:
    {{- include "nvidia-infra-controller-prereqs.labels" . | nindent 4 }}
  annotations:
spec:
  channel: {{ .Values.crunchyPostgres.channel }}
  name: crunchy-postgres-operator
  source: {{ .Values.crunchyPostgres.source }}
  sourceNamespace: {{ .Values.crunchyPostgres.sourceNamespace }}
  installPlanApproval: {{ .Values.crunchyPostgres.installPlanApproval }}
{{- end }}
