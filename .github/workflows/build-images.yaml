name: Build and Push Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  rest-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - nico-rest-api
          - nico-rest-workflow
          - nico-rest-site-manager
          - nico-rest-site-agent
          - nico-rest-db
          - nico-rest-cert-manager
          - nico-flow
          - nico-psm
          - nicocli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: helm/vendor/infra-controller/rest-api
          file: docker/ubi/Dockerfile.${{ matrix.image }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}

  core-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: nico-core
            dockerfile: docker/ubi/Dockerfile.nico-core
            context: helm/vendor/infra-controller
          - name: nico-admin-cli
            dockerfile: docker/ubi/Dockerfile.nico-admin-cli
            context: helm/vendor/infra-controller
          - name: nico-nsm
            dockerfile: docker/ubi/Dockerfile.nico-nsm
            context: helm/vendor/infra-controller/rest-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to registry.redhat.io
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USER }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare RHSM secrets
        run: |
          echo "${{ secrets.REDHAT_ORG_ID }}" > /tmp/rhsm_org
          echo "${{ secrets.REDHAT_ACTIVATION_KEY }}" > /tmp/rhsm_activationkey

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secret-files: |
            rhsm_org=/tmp/rhsm_org
            rhsm_activationkey=/tmp/rhsm_activationkey
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:${{ github.sha }}
