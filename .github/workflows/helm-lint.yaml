name: Helm Lint

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - '.github/workflows/helm-lint.yaml'
  pull_request:
    paths:
      - 'helm/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add temporal https://go.temporal.io/helm-charts
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update

      - name: Build dependencies
        run: |
          helm dependency build helm/nvidia-infra-controller-cloud/
          helm dependency build helm/nvidia-infra-controller-site/

      - name: Lint
        run: |
          helm lint helm/nvidia-infra-controller-prereqs/
          helm lint helm/nvidia-infra-controller-cloud/
          helm lint helm/nvidia-infra-controller-site/

      - name: Template (dry-run)
        run: |
          helm template nvidia-infra-controller-prereqs helm/nvidia-infra-controller-prereqs/ > /dev/null
          helm template nvidia-infra-controller-cloud helm/nvidia-infra-controller-cloud/ > /dev/null
          helm template nvidia-infra-controller-site helm/nvidia-infra-controller-site/ > /dev/null
